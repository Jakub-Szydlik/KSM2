<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSM Archidiecezja Warmińska</title>
    <style>
        html { scroll-behavior: smooth; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; overflow-x: hidden; }

        /* HEADER - Poprawiony układ */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between; /* Rozpycha logo i nawigację na boki */
            align-items: center; 
            width: 95%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 10px 0;
        }

        /* LOGO - Skaluje się lepiej */
        .logo img {
            height: clamp(60px, 10vw, 120px); /* Zmniejszyłem bazową wysokość dla laptopów */
            width: auto;
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.7));
            transition: 0.3s;
        }

        /* NAWIGACJA */
        nav ul {
            list-style: none;
            display: flex;
            gap: clamp(10px, 1.5vw, 25px);
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            font-size: clamp(0.7rem, 0.9vw, 0.85rem);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            white-space: nowrap;
        }
        nav a:hover { color: #D4AF37; }

        .btn-support {
            background: #b8860b !important;
            padding: 8px 15px !important;
            border-radius: 3px;
        }

        /* SLIDER - Poprawione centrowanie napisów */
        .ksm-slider { position: relative; width: 100%; height: 100vh; overflow: hidden; background: #000; }
        .ksm-slide { display: none; position: absolute; width: 100%; height: 100%; animation: fadeAnim 1.5s; }
        .ksm-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); }

        .ksm-overlay {
            position: absolute;
            top: 55%; /* Obniżone nieco pod logo */
            left: 50%;
            transform: translate(-50%, -50%); /* To klucz do idealnego środka */
            text-align: center;
            width: 90%;
            pointer-events: none;
        }
        .ksm-word {
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: clamp(4px, 1.5vw, 12px);
            color: white;
            text-transform: uppercase;
            border-bottom: 4px solid #D4AF37;
            display: inline-block;
            padding-bottom: 10px;
            text-shadow: 2px 2px 20px rgba(0,0,0,1);
            margin: 0;
        }

        @keyframes fadeAnim { from { opacity: 0; } to { opacity: 1; } }

        /* SEKCJA NEWSÓW */
        .news-section { max-width: 1400px; margin: 40px auto; padding: 40px 20px; }
        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
        }
        .news-card { background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        .news-card img { width: 100%; height: 200px; object-fit: cover; }

        /* RWD DLA SMARTFONA */
        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 15px; }
            nav ul { flex-wrap: wrap; justify-content: center; }
            .ksm-slider { height: 70vh; }
            .ksm-word { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">
                <img src="KSM_Warmia_logo.png" alt="KSM">
            </div>
            <nav>
                <ul>
                    <li><a href="#">Aktualności</a></li>
                    <li><a href="#aktualnosci">Kalendarz</a></li>
                    <li><a href="#">O nas</a></li>
                    <li><a href="#">Kontakt</a></li>
                    <li><a href="#">Do pobrania</a></li>
                    <li><a href="#" class="btn-support">Wesprzyj</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="ksm-slider">
        <div class="ksm-slide" style="display: block;">
            <img src="123.jpg">
            <div class="ksm-overlay"><h1 class="ksm-word">BÓG</h1></div>
        </div>
        <div class="ksm-slide">
            <img src="123456.jpg">
            <div class="ksm-overlay"><h1 class="ksm-word">PATRIOTYZM</h1></div>
        </div>
        <div class="ksm-slide">
            <img src="12345.jpg">
            <div class="ksm-overlay"><h1 class="ksm-word">LUDZIE</h1></div>
        </div>
    </div>

    <section class="news-section" id="aktualnosci">
        <div class="news-grid">
            <div class="news-card">
                <img src="2134.jpg">
                <div class="news-content"><h3>Wspólne Uwielbienie</h3><p>Relacja z modlitwy KSM Redemptor.</p></div>
            </div>
            <div class="news-card">
                <img src="5212.jpg">
                <div class="news-content"><h3>Szkolenie Liderów</h3><p>Nowe kadry gotowe do działania.</p></div>
            </div>
        </div>
    </section>

    <script>
        let slideIndex = 0;
        const slides = document.getElementsByClassName("ksm-slide");
        function showSlides() {
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 5000);
        }
        showSlides();
    </script>

</body>
</html>
