<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSM Archidiecezja Warmińska</title>
    <style>
        /* RESET I BAZA */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial', sans-serif; background: #000; color: white; }

        /* MENU NAWIGACYJNE */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            box-sizing: border-box;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: white;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover { color: #ffcc00; }

        /* SLIDER */
        .ksm-slider {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .ksm-slide {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            animation: fadeAnim 1.5s ease-in-out;
        }

        .ksm-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(40%); /* Przyciemnienie jak na image_7832d7.jpg */
        }

        .ksm-overlay {
            position: absolute;
            top: 55%; /* Lekko obniżone, żeby zrobić miejsce dla menu */
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
        }

        .ksm-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            font-weight: 300;
        }

        .ksm-word {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
        }

        @keyframes fadeAnim {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* MOBILNE */
        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; gap: 10px; }
            nav ul { gap: 15px; }
            .ksm-word { font-size: 2.5rem; letter-spacing: 5px; }
            .ksm-title { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KSM Warmia</div>
        <nav>
            <ul>
                <li><a href="#">Start</a></li>
                <li><a href="#">O nas</a></li>
                <li><a href="#">Wydarzenia</a></li>
                <li><a href="#">Kontakt</a></li>
            </ul>
        </nav>
    </header>

    <div class="ksm-slider">
        <!-- Slajdy - Tutaj podmień linki na swoje jeśli chcesz inne zdjęcia -->
        <div class="ksm-slide">
            <img src="https://ksmarchwarmia.wordpress.com/wp-content/uploads/2026/05/123.jpg" alt="Bóg">
            <div class="ksm-overlay">
                <div class="ksm-title">KSM to:</div>
                <h1 class="ksm-word">BÓG</h1>
            </div>
        </div>

        <div class="ksm-slide">
            <img src="https://ksmarchwarmia.wordpress.com/wp-content/uploads/2026/05/123456.jpg" alt="Patriotyzm">
            <div class="ksm-overlay">
                <div class="ksm-title">KSM to:</div>
                <h1 class="ksm-word">PATRIOTYZM</h1>
            </div>
        </div>

        <div class="ksm-slide">
            <img src="https://ksmarchwarmia.wordpress.com/wp-content/uploads/2026/05/321.jpg" alt="Wspólnota">
            <div class="ksm-overlay">
                <div class="ksm-title">KSM to:</div>
                <h1 class="ksm-word">WSPÓLNOTA</h1>
            </div>
        </div>
    </div>

    <script>
        let slideIndex = 0;
        const slides = document.getElementsByClassName("ksm-slide");

        function showSlides() {
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1; }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 4000);
        }

        showSlides();
    </script>

</body>
</html>
