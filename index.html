<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSM Archidiecezja Warmińska</title>
    <style>
        html { scroll-behavior: smooth; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; overflow-x: hidden; }

        /* LOGO - Teraz jest duże i niezależne */
        .main-logo {
            position: absolute;
            top: 20px;
            left: 5%;
            z-index: 1100; /* Powyżej wszystkiego */
        }

        .main-logo img {
            height: clamp(100px, 15vw, 220px); /* Na laptopie około 180-200px, na TV do 220px */
            width: auto;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.8));
        }

        /* HEADER / MENU - Osobny pasek dla czytelności */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.4); /* Półprzezroczyste tło pod menu */
            backdrop-filter: blur(5px); /* Efekt oszronionego szkła */
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: flex-end; /* Menu do prawej */
            align-items: center; 
            width: 90%;
            max-width: 1600px;
            margin: 0 auto;
            height: 70px; /* Stała wysokość paska menu */
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        nav a:hover { color: #D4AF37; }

        .btn-support {
            background: #b8860b !important;
            padding: 10px 20px !important;
            border-radius: 3px;
        }

        /* SLIDER */
        .ksm-slider { position: relative; width: 100%; height: 100vh; overflow: hidden; background: #000; }
        .ksm-slide { display: none; position: absolute; width: 100%; height: 100%; animation: fadeAnim 1.5s; }
        .ksm-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(35%); }

        /* CENTROWANIE NAPISÓW */
        .ksm-overlay {
            position: absolute;
            top: 60%; /* Przesunięte w dół, żeby nie biło się z logo */
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }
        .ksm-word {
            font-size: clamp(2.5rem, 8vw, 7rem);
            font-weight: 900;
            letter-spacing: clamp(5px, 2vw, 15px);
            color: white;
            text-transform: uppercase;
            border-bottom: 5px solid #D4AF37;
            display: inline-block;
            padding-bottom: 10px;
            text-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        @keyframes fadeAnim { from { opacity: 0; } to { opacity: 1; } }

        /* RWD - TELEFON */
        @media (max-width: 768px) {
            .main-logo { width: 100%; left: 0; text-align: center; top: 80px; }
            .main-logo img { height: 120px; }
            
            header { position: relative; background: #000; }
            .nav-container { justify-content: center; height: auto; padding: 15px 0; }
            nav ul { flex-wrap: wrap; justify-content: center; gap: 10px; }
            
            .ksm-slider { height: 65vh; }
            .ksm-overlay { top: 70%; }
            .ksm-word { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <!-- Logo wyciągnięte przed Header, żeby mogło być duże -->

    <header>
        <div class="nav-container">
            <div class="main-logo">
                <img src="KSM_Warmia_logo.png" alt="KSM">
            </div>
            <nav>
                <ul>
                    <li><a href="#">Aktualności</a></li>
                    <li><a href="#aktualnosci">Kalendarz</a></li>
                    <li><a href="#">O nas</a></li>
                    <li><a href="#">Kontakt</a></li>
                    <li><a href="#">Do pobrania</a></li>
                    <li><a href="#" class="btn-support">Wesprzyj</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="ksm-slider">
        <div class="ksm-slide" style="display: block;">
            <img src="123.jpg">
            <div class="ksm-overlay"><h1 class="ksm-word">BÓG</h1></div>
        </div>
        <div class="ksm-slide">
            <img src="123456.jpg">
            <div class="ksm-overlay"><h1 class="ksm-word">PATRIOTYZM</h1></div>
        </div>
        <div class="ksm-slide">
            <img src="12345.jpg">
            <div class="ksm-overlay"><h1 class="ksm-word">LUDZIE</h1></div>
        </div>
    </div>

    <!-- Reszta sekcji bez zmian -->
    <section class="news-section" id="aktualnosci" style="padding: 50px 20px; text-align: center;">
        <h2 style="color: #D4AF37; text-transform: uppercase;">Ostatnie wydarzenia</h2>
        <!-- Tutaj Grid z poprzedniego kodu -->
    </section>

    <script>
        let slideIndex = 0;
        const slides = document.getElementsByClassName("ksm-slide");
        function showSlides() {
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 5000);
        }
        showSlides();
    </script>

</body>
</html>
