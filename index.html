<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSM Archidiecezja Warmińska</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }

        .ksm-slider {
            position: relative;
            width: 100%;
            height: 100vh; /* Slider na cały ekran */
            overflow: hidden;
        }

        .ksm-slide {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            animation: fadeAnim 1.5s ease-in-out;
        }

        .ksm-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(50%); /* Przyciemnienie zdjęcia */
        }

        .ksm-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            width: 90%;
        }

        .ksm-title {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .ksm-word {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0;
        }

        @keyframes fadeAnim {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Styl dla urządzeń mobilnych */
        @media (max-width: 768px) {
            .ksm-word { font-size: 3rem; }
            .ksm-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="ksm-slider">
        <!-- Slajd 1 -->
        <div class="ksm-slide">
            <img src="https://ksmarchwarmia.wordpress.com/wp-content/uploads/2026/05/123.jpg" alt="Bóg">
            <div class="ksm-overlay">
                <div class="ksm-title">KSM to:</div>
                <h1 class="ksm-word">BÓG</h1>
            </div>
        </div>

        <!-- Slajd 2 -->
        <div class="ksm-slide">
            <img src="https://ksmarchwarmia.wordpress.com/wp-content/uploads/2026/05/123456.jpg" alt="Patriotyzm">
            <div class="ksm-overlay">
                <div class="ksm-title">KSM to:</div>
                <h1 class="ksm-word">PATRIOTYZM</h1>
            </div>
        </div>

        <!-- Slajd 3 -->
        <div class="ksm-slide">
            <img src="https://ksmarchwarmia.wordpress.com/wp-content/uploads/2026/05/321.jpg" alt="Wspólnota">
            <div class="ksm-overlay">
                <div class="ksm-title">KSM to:</div>
                <h1 class="ksm-word">WSPÓLNOTA</h1>
            </div>
        </div>

        <!-- Slajd 4 -->
        <div class="ksm-slide">
            <img src="https://ksmarchwarmia.wordpress.com/wp-content/uploads/2026/05/12345.jpg" alt="Ludzie">
            <div class="ksm-overlay">
                <div class="ksm-title">KSM to:</div>
                <h1 class="ksm-word">LUDZIE</h1>
            </div>
        </div>

        <!-- Slajd 5 -->
        <div class="ksm-slide">
            <img src="https://ksmarchwarmia.wordpress.com/wp-content/uploads/2026/05/5212.jpg" alt="Wartości">
            <div class="ksm-overlay">
                <div class="ksm-title">KSM to:</div>
                <h1 class="ksm-word">WARTOŚCI</h1>
            </div>
        </div>
    </div>

    <script>
        let slideIndex = 0;
        const slides = document.getElementsByClassName("ksm-slide");

        function showSlides() {
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1; }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 4000);
        }

        showSlides();
    </script>

</body>
</html>
