<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSM Archidiecezja Warmińska</title>
    <style>
        html { scroll-behavior: smooth; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; }

        /* HEADER */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            background: transparent;
            z-index: 1000;
            padding: 20px 0; /* Odstęp od góry strony */
        }

        .nav-container {
            display: flex;
            align-items: center; /* Centruje elementy w pionie względem siebie */
            width: 95%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* LOGO - PO LEWEJ */
        .logo {
            flex-shrink: 0; /* Logo nie zmniejsza się */
        }

        .logo img {
            height: 250px; /* TU USTAWISZ WIELKOŚĆ HERBU */
            width: auto;
            display: block;
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.7));
        }

        /* NAWIGACJA - PUSH DO PRAWEJ */
        nav {
            flex-grow: 1; /* Zajmuje całą wolną przestrzeń */
            display: flex;
            justify-content: flex-end; /* Przesuwa listę menu na sam koniec (prawą stronę) */
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        nav a:hover { color: #D4AF37; }

        /* PRZYCISK WESPRZYJ */
        .btn-support {
            background: #b8860b !important;
            color: white !important;
            padding: 10px 22px !important;
            border-radius: 3px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        }

        /* SLIDER */
        .ksm-slider { position: relative; width: 100%; height: 100vh; overflow: hidden; background: #000; }
        .ksm-slide { display: none; position: absolute; width: 100%; height: 100%; animation: fadeAnim 1.5s; }
        .ksm-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(35%); }

        .ksm-overlay {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }
        .ksm-word {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: 10px;
            color: white;
            margin: 0;
            text-transform: uppercase;
            border-bottom: 4px solid #D4AF37;
            display: inline-block;
            padding-bottom: 5px;
        }

        @keyframes fadeAnim { from { opacity: 0; } to { opacity: 1; } }

        /* SEKCJA TREŚCI */
        .news-section { max-width: 1200px; margin: 80px auto; padding: 40px 20px; }
        .news-section h2 { text-align: center; color: #D4AF37; text-transform: uppercase; margin-bottom: 50px; font-size: 2.5rem; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .news-card { background: #1e1e1e; border: 1px solid #333; border-radius: 5px; overflow: hidden; transition: 0.3s; }
        .news-card:hover { border-color: #D4AF37; transform: translateY(-5px); }
        .news-card img { width: 100%; height: 200px; object-fit: cover; }
        .news-content { padding: 20px; }

        /* MOBILE */
        @media (max-width: 1024px) {
            .nav-container { flex-direction: column; gap: 20px; }
            nav { justify-content: center; }
            .logo img { height: 100px; }
            .ksm-word { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">
                <img src="KSM_Warmia_logo.png" alt="KSM">
            </div>
            <nav>
                <ul>
                    <li><a href="#">Główna</a></li>
                    <li><a href="#aktualnosci">Aktualności</a></li>
                    <li><a href="#">O nas</a></li>
                    <li><a href="#">Kontakt</a></li>
                    <li><a href="#" class="btn-support">Wesprzyj Nas</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="ksm-slider">
        <div class="ksm-slide" style="display: block;">
            <img src="123.jpg">
            <div class="ksm-overlay"><h1 class="ksm-word">BÓG</h1></div>
        </div>
        <div class="ksm-slide">
            <img src="123456.jpg">
            <div class="ksm-overlay"><h1 class="ksm-word">PATRIOTYZM</h1></div>
        </div>
        <div class="ksm-slide">
            <img src="12345.jpg">
            <div class="ksm-overlay"><h1 class="ksm-word">LUDZIE</h1></div>
        </div>
    </div>

    <section class="news-section" id="aktualnosci">
        <h2>Aktualności</h2>
        <div class="news-grid">
            <div class="news-card">
                <img src="https://ksmarchwarmia.wordpress.com/wp-content/uploads/2026/05/321.jpg">
                <div class="news-content"><h3>Walny Zjazd KSM</h3><p>Relacja z obrad...</p></div>
            </div>
            <div class="news-card">
                <img src="https://ksmarchwarmia.wordpress.com/wp-content/uploads/2026/05/5212.jpg">
                <div class="news-content"><h3>Szkolenie Liderów</h3><p>Nowe kadry...</p></div>
            </div>
        </div>
    </section>

    <script>
        let slideIndex = 0;
        const slides = document.getElementsByClassName("ksm-slide");
        function showSlides() {
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 5000);
        }
        showSlides();
    </script>

</body>
</html>
